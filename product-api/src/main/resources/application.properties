spring.application.name=api
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/detaling}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:detaling}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:detaling}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.swagger-ui.path=/swagger-ui

app.jwt.secret=${APP_JWT_SECRET:ZmFrZS1sb2NhbC1zZWNyZXQtZmFrZS1sb2NhbC1zZWNyZXQtMjAyNg==}
# JWT lives 2 years by default (test project convenience). Override via APP_JWT_EXPIRATION_MINUTES if needed.
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:1051200}

# AI (Spring AI + GigaChat)
app.ai.enabled=${APP_AI_ENABLED:true}
app.ai.token-limit-per-day=${APP_AI_TOKEN_LIMIT_PER_DAY:20000}
app.ai.timezone-samara=${APP_AI_TZ_SAMARA:Europe/Samara}
app.ai.moderation-cron-moscow=${APP_AI_MODERATION_CRON_MOSCOW:0 0 3 * * *}
app.ai.llm-timeout=${APP_AI_LLM_TIMEOUT:PT25S}

# Debug error details in JSON responses when X-Debug header is set (admin use)
app.debug.errors=${APP_DEBUG_ERRORS:false}

spring.ai.gigachat.auth.bearer.api-key=${GIGACHAT_API_KEY:}
spring.ai.gigachat.auth.scope=${GIGACHAT_SCOPE:GIGACHAT_API_PERS}
spring.ai.gigachat.auth.bearer.unsafe-ssl=${GIGACHAT_UNSAFE_SSL:false}

spring.ai.gigachat.chat.options.model=${GIGACHAT_MODEL:GigaChat}
spring.ai.gigachat.chat.options.temperature=${GIGACHAT_TEMPERATURE:0.2}
spring.ai.gigachat.chat.options.max-tokens=${GIGACHAT_MAX_TOKENS:500}

# GigaChat client timeouts (avoid hanging requests in prod)
spring.ai.gigachat.internal.connect-timeout=${GIGACHAT_CONNECT_TIMEOUT:PT10S}
spring.ai.gigachat.internal.read-timeout=${GIGACHAT_READ_TIMEOUT:PT30S}
