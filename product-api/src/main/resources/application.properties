spring.application.name=api
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/detaling}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:detaling}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:detaling}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.swagger-ui.path=/swagger-ui

app.jwt.secret=${APP_JWT_SECRET:ZmFrZS1sb2NhbC1zZWNyZXQtZmFrZS1sb2NhbC1zZWNyZXQtMjAyNg==}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:720}
